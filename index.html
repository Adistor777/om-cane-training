<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>O&M Cane Training — Teacher App</title>

<!-- =========================================================================
     THE APP. Content (categories, activities, SOPs, data fields) lives in
     activities.js — edit THAT, not this. This file is look + behaviour.

     ───────────────────────────────────────────────────────────────────────
     DESIGN DIRECTION — "field notebook, not dashboard"
     ───────────────────────────────────────────────────────────────────────
     Quiet, editorial, confident. The personality lives in ONE place per
     screen (the large Instrument Serif title) and ONE accent placement (the
     category colour). Everything else is calm and out of the way so a teacher
     can glance and log a result in seconds. The point of view is RESTRAINT —
     the opposite of a busy, evenly-decorated layout.

     ⚠ MAINTENANCE GUARDRAILS — READ BEFORE EDITING THE LOOK ⚠
     This build deliberately SUBTRACTS. The most common way to wreck it is to
     "helpfully" add decoration back. Don't. Specifically:

       1. ONE accent, not five. The colour spine (the 5px stripe) lives ONLY
          on category cards (screen 1), where it does real wayfinding. Do NOT
          add a stripe to panels, the SOP box, records, or the form. On the
          run screen the category colour appears in exactly TWO spots on
          purpose: the Save button and the active result selection. If you're
          tempted to colour a third thing — don't.

       2. ONE shadow tier. The page is flat. The single real shadow
          (--shadow-lift) is reserved for the primary form panel and for
          hover-lifted cards, so "elevated" means "interactive/important."
          Do NOT add a second shadow level or float the records.

       3. The serif is SACRED and SINGULAR. Instrument Serif appears once per
          screen, large, on the .lede only — never on labels, buttons, or
          panel titles. Need a second heading? Use Inter 600, not the serif.

       4. Differentiated radii are intentional: 20px containers / 14px records
          / 11px controls. All-one-radius reads as a template; keep the
          inner/outer contrast.

       5. Colours are contrast-checked. Every category pair and every text/bg
          pair meets WCAG AA (4.5:1). --ink-faint is #736b5e specifically
          because lighter warm-grays fail at 12–13px on the warm paper. If you
          lighten it for looks, you break accessibility for a blindness-
          community tool. Re-check any colour change at 12px before shipping.

       RULE OF THUMB: when something "looks too plain / too AI," SUBTRACT
       (a stripe, a shadow, a gradient, a font) before you add. Adding
       decoration to fix the look is what made the earlier versions worse.

     See DESIGN_NOTES.md for the full rationale. Behaviour, data, storage, and
     all accessibility fixes (post-save focus, SOP animation, reduced-motion,
     fieldset/legend) are settled — don't regress them.
     ========================================================================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @property --cat       { syntax:'<color>'; inherits:true; initial-value:#2f6f4e; }
  @property --cat-deep  { syntax:'<color>'; inherits:true; initial-value:#1f4d36; }
  @property --cat-soft  { syntax:'<color>'; inherits:true; initial-value:#e2efe5; }
  @property --cat-line  { syntax:'<color>'; inherits:true; initial-value:#cce0d1; }
  :root{
    --ink:#22201b; --ink-soft:#6b6458; --ink-faint:#736b5e; /* faint passes WCAG AA at 12px on paper; don't lighten (guardrail #5) */
    --paper:#f7f4ed; --card:#fffdf8; --line:#e8e0d0; --line-soft:#f0e9da;
    --cat:#2f6f4e; --cat-deep:#1f4d36; --cat-soft:#e2efe5; --cat-line:#cce0d1;
    --s1:8px; --s2:16px; --s3:24px; --s4:32px; --s5:48px;
    --t-display:38px; --t-title:18px; --t-body:17px; --t-bodysm:15px; --t-caption:13px; --t-micro:12px;
    --r-lg:20px; --r-md:14px; --r-sm:11px;
    --shadow-lift:0 1px 2px rgba(60,45,15,.05), 0 18px 40px -16px rgba(70,55,25,.22);
    --shadow-rest:0 1px 2px rgba(60,45,15,.04);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;}
  svg{ max-width:100%; }
  .panel-title > svg, .media-slot > svg, .back > svg{ flex:0 0 auto; }
  html{ -webkit-text-size-adjust:100%; }
  body{ margin:0; min-height:100vh; background:var(--paper); color:var(--ink);
    font-family:"Inter", system-ui, -apple-system, sans-serif; font-size:var(--t-body); line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    /* App-feel on touch: smooth momentum scroll, no blue tap flash, no rubber-band overscroll into white. */
    -webkit-overflow-scrolling:touch; overscroll-behavior-y:none;
    -webkit-tap-highlight-color:transparent; }
  /* Interactive controls shouldn't show a text-selection caret / iOS callout menu on long-press. */
  .card, .back, .seg button, .save, details.sop summary, .tool-btn{
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;
    touch-action:manipulation; }
  /* But real text inputs must stay selectable. */
  input, textarea{ -webkit-user-select:text; user-select:text; }
  header{ position:sticky; top:0; z-index:20; background:rgba(255,253,248,.82);
    backdrop-filter:saturate(120%) blur(12px); -webkit-backdrop-filter:saturate(120%) blur(12px);
    border-bottom:1px solid var(--line); color:var(--ink);
    /* Safe-area: clear the notch/status bar on top, and the rounded corners on the sides. */
    padding:calc(var(--s2) + env(safe-area-inset-top)) calc(var(--s3) + env(safe-area-inset-right)) var(--s2) calc(var(--s3) + env(safe-area-inset-left));
    display:flex; align-items:center; gap:var(--s2); }
  header::before{ content:""; position:absolute; left:0; right:0; top:0; height:3px; background:var(--cat); }
  .home-dot{ width:42px; height:42px; border-radius:12px; background:var(--cat-soft); color:var(--cat-deep);
    flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    font-family:"Inter", sans-serif; font-weight:600; font-size:var(--t-title); }
  .home-dot svg{ width:21px; height:21px; }
  .brand{ font-size:var(--t-bodysm); margin:0; font-weight:600; line-height:1.2; color:var(--ink); letter-spacing:-.01em; }
  .crumb{ font-size:var(--t-caption); margin-top:1px; color:var(--cat-deep); font-weight:500; }
  .back{ width:42px; height:42px; flex:0 0 auto; background:transparent; border:1px solid var(--line);
    color:var(--ink-soft); cursor:pointer; border-radius:12px; display:flex; align-items:center; justify-content:center;
    transition:background .15s ease, transform .15s ease, color .15s ease, border-color .15s; }
  .back svg{ width:21px; height:21px; }
  @media (hover:hover){
    .back:hover{ background:var(--cat-soft); color:var(--cat-deep); border-color:var(--cat-line); transform:translateX(-2px); }
  }
  .back:active{ background:var(--cat-soft); color:var(--cat-deep); }
  .back:focus-visible{ outline:3px solid var(--cat); outline-offset:2px; }
  .wrap{ max-width:880px; margin:0 auto;
    padding:var(--s5) calc(24px + env(safe-area-inset-right)) calc(120px + env(safe-area-inset-bottom)) calc(24px + env(safe-area-inset-left)); }
  #screen{ animation:enterFwd .42s var(--ease) both; }
  #screen[data-dir="back"]{ animation:enterBack .42s var(--ease) both; }
  @keyframes enterFwd { from{opacity:0; transform:translateX(24px);} to{opacity:1; transform:translateX(0);} }
  @keyframes enterBack{ from{opacity:0; transform:translateX(-24px);} to{opacity:1; transform:translateX(0);} }
  .stagger .card, .stagger .cat-group{ animation:cardIn .46s var(--ease) both; }
  .stagger .card:nth-child(1), .stagger .cat-group:nth-of-type(1){animation-delay:0ms}
  .stagger .card:nth-child(2), .stagger .cat-group:nth-of-type(2){animation-delay:55ms}
  .stagger .card:nth-child(3), .stagger .cat-group:nth-of-type(3){animation-delay:110ms}
  .stagger .card:nth-child(4), .stagger .cat-group:nth-of-type(4){animation-delay:165ms}
  .stagger .card:nth-child(5), .stagger .cat-group:nth-of-type(5){animation-delay:210ms}
  .stagger .card:nth-child(n+6), .stagger .cat-group:nth-of-type(n+6){animation-delay:240ms}
  @keyframes cardIn{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion:reduce){
    #screen, #screen[data-dir="back"], .stagger .card, .stagger .cat-group{ animation:fade .2s ease both; }
    @keyframes fade{ from{opacity:0;} to{opacity:1;} }
    .card:hover{ transform:none !important; }
    .card:active{ transform:none !important; }
    .seg button:active, .save:active{ transform:none !important; }
    details.sop summary .chev{ transition:none !important; }
    details.disclosure > summary .chev{ transition:none !important; }
    .sop-body{ transition:none !important; }
  }
  /* THE ONE SERIF MOMENT — .lede only, never elsewhere (guardrail #3). */
  .lede{ font-family:"Instrument Serif", Georgia, serif; font-weight:400; font-size:var(--t-display);
    line-height:1.04; letter-spacing:-.01em; margin:0 0 var(--s4); color:var(--ink); max-width:20ch; }
  .lede small{ display:block; font-family:"Inter", sans-serif; font-weight:400; font-size:var(--t-bodysm);
    line-height:1.5; color:var(--ink-soft); margin-top:var(--s2); max-width:52ch; letter-spacing:0; }
  .lede:focus{ outline:none; }
  .grid{ display:grid; gap:20px; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); }
  .card{ --c:var(--cat); background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:28px; box-shadow:var(--shadow-rest); cursor:pointer; text-align:left; font:inherit; color:inherit;
    width:100%; position:relative; overflow:hidden;
    transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s; }
  @media (hover:hover){
    .card:hover{ transform:translateY(-4px); box-shadow:var(--shadow-lift); border-color:var(--c); }
  }
  .card:active{ transform:translateY(-1px); box-shadow:var(--shadow-lift); border-color:var(--c); }
  .card:focus-visible{ outline:3px solid var(--c); outline-offset:3px; }
  /* The wayfinding spine — the ONLY place it's allowed. See guardrail #1. */
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--c); }
  .card .kicker{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .card .blob{ width:34px; height:34px; border-radius:10px; flex:0 0 auto; background:var(--c);
    display:flex; align-items:center; justify-content:center; color:#fff;
    font-family:"Inter",sans-serif; font-weight:700; font-size:var(--t-bodysm); letter-spacing:-.02em; }
  .card h2{ font-family:"Inter", sans-serif; font-weight:600; font-size:var(--t-title); margin:0; line-height:1.25; letter-spacing:-.01em; }
  .card p{ margin:0; font-size:var(--t-bodysm); color:var(--ink-soft); line-height:1.5; }
  .card .meta{ display:flex; align-items:center; gap:var(--s1); margin-top:18px; flex-wrap:wrap; }
  .card .count-text{ font-size:var(--t-micro); color:var(--ink-faint); font-weight:500; letter-spacing:.01em; }
  .card.activity h2{ margin-bottom:0; }
  .tag{ display:inline-block; font-size:var(--t-micro); padding:3px 11px; border-radius:999px; font-weight:600; letter-spacing:.01em; }
  .tag.cane{ background:#f3e2d6; color:#8a3c12; }
  .tag.nocane{ background:var(--cat-soft); color:var(--cat-deep); }
  .tag.neutral{ background:transparent; color:var(--ink-soft); border:1px solid var(--line); }
  .pill.saved{ display:inline-block; font-size:var(--t-micro); padding:3px 11px; border-radius:999px; font-weight:600; background:transparent; color:var(--ink-faint); border:1px solid var(--line); }
  /* RUN-SCREEN PANELS: near-flat, NO colour spine (guardrail #1). */
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg);
    padding:var(--s4); margin-bottom:var(--s3); position:relative; }
  /* Only the primary form panel is elevated — that's what makes it the hero (guardrail #2). */
  .panel.primary{ box-shadow:var(--shadow-lift); border-color:var(--line); }
  /* Past-results is a quiet list: flat, transparent, border-only. Don't float it. */
  .panel.quiet{ box-shadow:none; background:transparent; border:none; padding:var(--s2) 0 0; }
  .panel-title{ font-family:"Inter", sans-serif; font-weight:600; font-size:var(--t-title);
    margin:0 0 var(--s3); color:var(--ink); display:flex; align-items:center; gap:10px; letter-spacing:-.01em; }
  .panel-title svg{ width:19px; height:19px; flex:0 0 auto; color:var(--cat-deep); }
  .panel.quiet .panel-title{ color:var(--ink-soft); font-size:var(--t-bodysm); margin-bottom:var(--s2); }
  .panel.quiet .panel-title svg{ width:17px; height:17px; }
  details.sop{ margin-bottom:var(--s3); background:transparent; border:1px solid var(--line);
    border-radius:var(--r-lg); position:relative; overflow:hidden; padding:var(--s3) var(--s4); }
  details.sop summary{ list-style:none; cursor:pointer; display:flex; align-items:center; gap:10px;
    font-family:"Inter",sans-serif; font-weight:600; font-size:var(--t-title); color:var(--ink); user-select:none; letter-spacing:-.01em; }
  details.sop summary > svg{ width:19px; height:19px; flex:0 0 auto; color:var(--cat-deep); }
  details.sop summary::-webkit-details-marker{ display:none; }
  details.sop summary .chev{ margin-left:auto; transition:transform .24s var(--ease); width:19px; height:19px; flex:0 0 auto; color:var(--ink-faint); }
  details.sop summary .chev svg{ width:19px; height:19px; display:block; }
  details.sop[open] summary .chev{ transform:rotate(180deg); }
  details.sop summary:focus-visible{ outline:3px solid var(--cat); outline-offset:3px; border-radius:8px; }
  details.sop:not([open]) .sop-body{ display:grid; }
  .sop-body{ display:grid; grid-template-rows:0fr; transition:grid-template-rows .26s var(--ease); }
  details.sop[open] .sop-body{ grid-template-rows:1fr; }
  .sop-body > .sop-inner{ overflow:hidden; min-height:0; }
  details.sop[open] .sop-body > .sop-inner{ padding-top:var(--s3); }
  /* Hub demographics disclosure — same slide-down mechanism as the SOP
     (grid-rows 0fr→1fr), styled as a tappable form-opener. One container; the
     form inside renders bare so there's no double framing or second shadow. */
  details.disclosure{ margin-bottom:var(--s3); background:var(--card); border:1px solid var(--line);
    border-radius:var(--r-lg); position:relative; overflow:hidden; }
  details.disclosure > summary{ list-style:none; cursor:pointer; display:flex; align-items:center; gap:12px;
    padding:18px var(--s3); font-family:"Inter",sans-serif; font-weight:600; font-size:var(--t-bodysm);
    color:var(--ink); user-select:none; letter-spacing:-.005em; }
  details.disclosure > summary::-webkit-details-marker{ display:none; }
  details.disclosure > summary > svg{ width:20px; height:20px; flex:0 0 auto; color:var(--cat-deep);
    background:var(--cat-soft); border-radius:11px; padding:9px; box-sizing:content-box; }
  details.disclosure > summary .disclosure-label{ flex:1; min-width:0; }
  details.disclosure > summary .chev{ margin-left:auto; transition:transform .24s var(--ease); width:19px; height:19px; flex:0 0 auto; color:var(--ink-faint); }
  details.disclosure > summary .chev svg{ width:19px; height:19px; display:block; }
  details.disclosure[open] > summary .chev{ transform:rotate(180deg); }
  details.disclosure > summary:focus-visible{ outline:3px solid var(--cat); outline-offset:-3px; border-radius:var(--r-lg); }
  details.disclosure:not([open]) .sop-body{ display:grid; }
  details.disclosure[open] .sop-body{ grid-template-rows:1fr; }
  details.disclosure[open] .sop-body > .sop-inner{ padding:0 var(--s3) var(--s3); }
  @media (hover:hover){ details.disclosure > summary:hover{ background:var(--cat-soft); } }
  .sop-list{ margin:0; padding:0; list-style:none; counter-reset:step; }
  .sop-list li{ counter-increment:step; position:relative; padding:0 0 var(--s3) 42px; margin:0; color:var(--ink); }
  .sop-list li:last-child{ padding-bottom:0; }
  .sop-list li::before{ content:counter(step); position:absolute; left:0; top:-2px; width:28px; height:28px;
    border-radius:50%; background:var(--cat-soft); color:var(--cat-deep);
    font-family:"Inter",sans-serif; font-weight:600; font-size:var(--t-caption); display:flex; align-items:center; justify-content:center; }
  .sop-list li:not(:last-child)::after{ content:""; position:absolute; left:13px; top:30px; bottom:6px; width:2px; background:var(--cat-line); }
  .note{ background:#fbf3da; border:1px solid #ecdca6; border-radius:var(--r-md);
    padding:var(--s2) var(--s3); margin-top:var(--s3); font-size:var(--t-bodysm); color:#5c4a1e; }
  .note strong{ display:block; margin-bottom:4px; font-weight:600; color:#7a5e16; }
  .media-slot{ margin-top:var(--s2); border:1.5px dashed var(--line); border-radius:var(--r-md);
    padding:var(--s2) var(--s3); font-size:var(--t-bodysm); color:var(--ink-faint); text-align:left; display:flex; align-items:center; gap:10px; }
  .media-slot svg{ width:18px; height:18px; flex:0 0 auto; }
  /* SOP audio language switcher: reuses .seg styling (same control as the result
     picker), inherits the category accent. The native-script labels (हिन्दी /
     தமிழ் / বাংলা) let a teacher recognise their language at a glance. */
  .audio-lang{ margin-top:var(--s2); }
  .audio-lang .audio-lang-label{ display:block; font-size:var(--t-micro); color:var(--ink-faint); font-weight:500; margin-bottom:8px; }
  .audio-lang audio{ width:100%; margin-top:12px; }
  fieldset{ border:none; margin:0; padding:0; }
  .field{ margin-bottom:var(--s3); }
  .field > label{ display:block; font-weight:600; margin-bottom:10px; font-size:var(--t-bodysm); color:var(--ink); letter-spacing:-.005em; }
  .field input[type=number], .field input[type=text], .field textarea{ width:100%; padding:13px 15px; border:1px solid var(--line); border-radius:var(--r-sm);
    font:inherit; background:#fff; color:var(--ink); transition:border-color .15s, box-shadow .15s; }
  .field input[type=number]::placeholder, .field input[type=text]::placeholder, .field textarea::placeholder{ color:var(--ink-faint); }
  .field input[type=number]:focus, .field input[type=text]:focus, .field textarea:focus{ outline:none; border-color:var(--cat); box-shadow:0 0 0 3px var(--cat-soft); }
  .field textarea{ min-height:84px; resize:vertical; }
  .seg{ display:flex; gap:var(--s1); flex-wrap:wrap; }
  .seg button{ flex:1; min-width:96px; padding:13px; border:1px solid var(--line); border-radius:var(--r-sm);
    background:#fff; cursor:pointer; font:inherit; font-size:var(--t-bodysm); font-weight:500; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s var(--ease), background .15s, border-color .15s, color .15s; }
  @media (hover:hover){
    .seg button:hover{ border-color:var(--cat-line); color:var(--ink); }
  }
  .seg button:active{ transform:scale(.97); }
  .seg button[aria-pressed="true"]{ background:var(--cat); color:#fff; border-color:var(--cat); font-weight:600; }
  .seg button:focus-visible{ outline:3px solid var(--cat); outline-offset:2px; }
  .checkrow{ display:flex; align-items:center; gap:12px; }
  .checkrow input{ width:24px; height:24px; accent-color:var(--cat); }
  .checkrow label{ margin:0; font-weight:600; font-size:var(--t-bodysm); color:var(--ink); }
  .save{ background:var(--cat); color:#fff; border:none; border-radius:var(--r-sm); padding:16px 24px;
    font-size:var(--t-body); font-weight:600; cursor:pointer; font-family:"Inter",sans-serif; width:100%;
    letter-spacing:-.005em; transition:transform .12s, filter .15s, background .15s; margin-top:var(--s1); }
  @media (hover:hover){
    .save:hover{ filter:brightness(1.07); transform:translateY(-1px); }
  }
  .save:active{ transform:translateY(0) scale(.99); }
  .save:disabled{ opacity:.55; cursor:default; transform:none; filter:none; }
  .save:focus-visible{ outline:3px solid var(--ink); outline-offset:2px; }
  .record{ background:var(--card); border:1px solid var(--line); border-radius:var(--r-md);
    padding:var(--s2) var(--s3); margin-bottom:10px; }
  .record .who{ font-weight:600; color:var(--ink); }
  .record .when{ color:var(--ink-faint); font-size:var(--t-caption); }
  .record .vals{ margin-top:10px; display:flex; flex-wrap:wrap; gap:6px; }
  .record .vals span{ display:inline-block; background:var(--line-soft); color:var(--ink-soft);
    padding:3px 11px; border-radius:999px; font-size:var(--t-caption); font-weight:500; }
  .record .vals span.val-result{ background:var(--cat-soft); color:var(--cat-deep); font-weight:600; }
  /* Per-record delete: a quiet icon button, neutral until interacted with, then
     the existing semantic rust (#8a3c12 — same as the "with cane" tag, NOT a new
     accent). Border-only, no new shadow tier. */
  .record .rec-head{ display:flex; align-items:flex-start; gap:var(--s2); }
  .record .rec-meta{ flex:1; min-width:0; }
  .rec-del{ flex:0 0 auto; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    background:transparent; border:1px solid var(--line); border-radius:var(--r-sm); color:var(--ink-faint);
    cursor:pointer; padding:0; transition:background .15s, border-color .15s, color .15s; }
  .rec-del svg{ width:16px; height:16px; }
  @media (hover:hover){ .rec-del:hover{ border-color:#dcab8e; color:#8a3c12; background:#f6e3d6; } }
  .rec-del:active{ background:#f3e2d6; color:#8a3c12; }
  .rec-del:focus-visible{ outline:3px solid #8a3c12; outline-offset:2px; }
  /* "Remove" on the Manage-data child rows: reuse the .swap chip, rust on intent. */
  .swap.danger{ display:inline-flex; align-items:center; gap:7px; }
  .swap.danger svg{ width:15px; height:15px; }
  @media (hover:hover){ .swap.danger:hover{ border-color:#dcab8e; color:#8a3c12; } }
  .swap.danger:active{ background:#f6e3d6; color:#8a3c12; }
  /* Danger zone: border-only block, no shadow (guardrail #2), rust framing only. */

const ICON = {

  catPushToy:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5 H8"/><path d="M6.5 5 L13.5 16"/><path d="M9 16 H19"/><circle cx="10.5" cy="19" r="2"/><circle cx="17" cy="19" r="2"/></svg>',
  catTerrain:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8c3-2 5-2 9 0s6 2 9 0"/><path d="M3 13c3-2 5-2 9 0s6 2 9 0"/><path d="M3 18c3-2 5-2 9 0s6 2 9 0"/></svg>',

/* Per-category icons are POSITIONAL — keyed by category index, exactly like

   the icon follows the slot, not the name. Index past the end falls back to a

const CATEGORY_ICONS = [
  ICON.compass,       // 0 Direction
  ICON.catEar,        // 1 Sound
  ICON.catSoundDir,   // 2 Sound + Direction
  ICON.catFootprints, // 3 Straight Line Travel
  ICON.catPushToy,    // 4 Push Toy
  ICON.catTerrain,    // 5 Terrain Game
  ICON.catDots,       // 6 Other Activities

function catIcon(i){ return CATEGORY_ICONS[i] || ICON.catDots; }
const CATEGORY_PALETTE = [
  { c:"#2f6f4e", deep:"#1f4d36", soft:"#e2efe5", line:"#cce0d1" },
  { c:"#1f6f86", deep:"#124a5b", soft:"#dceef2", line:"#c2e0e8" },
  { c:"#6a4ea8", deep:"#47326f", soft:"#eae3f5", line:"#dccff0" },
  { c:"#b5521f", deep:"#8a3c12", soft:"#f6e3d6", line:"#eccdb6" },
  { c:"#8a6f2b", deep:"#5f4c1c", soft:"#f3ead0", line:"#e6d6a8" },
  { c:"#3a7d5d", deep:"#265a41", soft:"#e2f0e8", line:"#c8e2d2" },
  { c:"#9a4060", deep:"#702c45", soft:"#f4e0e8", line:"#ecc6d5" },

  document.body.style.setProperty('--cat',      p.c);
  document.body.style.setProperty('--cat-deep', p.deep);
  document.body.style.setProperty('--cat-soft', p.soft);

function resetTheme(){ themeFor(0); }
function catColor(i){ return CATEGORY_PALETTE[i % CATEGORY_PALETTE.length].c; }
/* ---------------------------------------------------------------------------
   STORAGE SEAM — the ONLY place that touches the storage backend.
   Backend: Capacitor Preferences on native (Android/iOS), localStorage on the
   plain web. Selected ONCE at boot in Store.init(). Nothing else in this file
   knows which backend is live.

   THE SYNC/ASYNC SPLIT (read this before editing):
   Native Preferences is asynchronous (every get/set returns a Promise); there
   is no synchronous native storage. But every render function here reads
   storage synchronously while building HTML, and rewriting all of them to
   await reads would be a huge, fragile change. So the seam keeps a synchronous
   in-memory CACHE that mirrors the backend:

     • Store.init()  — async, run ONCE at boot. Loads the whole backend into the
                       cache. Until it resolves, reads would be empty, so boot
                       waits for it.
     • READS  (getJSON/getString/_keys) — synchronous, served from the cache.
                       Render code stays unchanged.
     • WRITES (setJSON/setString/_remove) — ASYNC. They update the cache
                       synchronously (so a following read is correct), then
                       write through to the backend and READ BACK to verify.
                       The returned Promise resolves true only when the backend
                       confirms the write. Callers `await` this and warn the
                       teacher on false — the write-verify guarantee is intact
                       end-to-end, not faked off the cache.

   Why verify at all: inside a native WebView a quota/serialise/OS error can
   fail SILENTLY — the worst outcome for a children's data tool. A failed write
   surfaces to the teacher (who can export a CSV) instead of vanishing.

   TO CHANGE BACKENDS: edit ONLY the four _backend* bodies + the detection in
   init(). The cache, verify, and public API stay put.
   --------------------------------------------------------------------------- */
const Store = {
  _cache: {},            // key -> string value (mirror of the backend)
  _ready: false,
  _native: false,
  _prefs: null,          // Capacitor Preferences plugin handle, when native

  // ---- backend primitives (the ONLY backend-specific code) ----------------
  async _backendEntries(){
    if(this._native){
      const { keys } = await this._prefs.keys();
      const out = {};
      for(const k of keys){ const { value } = await this._prefs.get({ key:k }); out[k] = value; }
      return out;
    }
    const out = {};
    try { for(let i=0;i<localStorage.length;i++){ const k = localStorage.key(i); out[k] = localStorage.getItem(k); } } catch(e){}
    return out;
  },
  async _backendSet(key, val){
    if(this._native){ await this._prefs.set({ key, value: val }); return true; }
    try { localStorage.setItem(key, val); return true; } catch(e){ return false; }
  },
  async _backendGet(key){
    if(this._native){ const { value } = await this._prefs.get({ key }); return value; }
    try { return localStorage.getItem(key); } catch(e){ return null; }
  },
  async _backendRemove(key){
    if(this._native){ await this._prefs.remove({ key }); return; }
    try { localStorage.removeItem(key); } catch(e){}
  },

  // ---- boot: detect backend, fill the cache once --------------------------
  async init(){
    // Capacitor injects window.Capacitor; Preferences is registered as a plugin.
    const cap = window.Capacitor;
    if(cap && cap.isNativePlatform && cap.isNativePlatform() && cap.Plugins && cap.Plugins.Preferences){
      this._native = true;
      this._prefs = cap.Plugins.Preferences;
    }
    this._cache = await this._backendEntries();
    this._ready = true;
  },

  // ---- synchronous reads (served from cache) ------------------------------
  _get(key){ return Object.prototype.hasOwnProperty.call(this._cache, key) ? this._cache[key] : null; },
  _keys(){ return Object.keys(this._cache); },
  getJSON(key, fallback){
    const raw = this._get(key);
    if(raw == null) return fallback;
    try { return JSON.parse(raw); } catch(e){ return fallback; }
  },
  getString(key, fallback){ const v = this._get(key); return v == null ? fallback : v; },

  // ---- asynchronous writes (cache + write-through + read-back verify) -----
  // Resolves true only if the backend confirms the value was stored.
  async setJSON(key, value){
    const serialised = JSON.stringify(value);
    this._cache[key] = serialised;                 // sync cache update first
    const ok = await this._backendSet(key, serialised);
    if(!ok) return false;
    const check = await this._backendGet(key);     // read-back verify
    return check === serialised;
  },
  async setString(key, value){
    this._cache[key] = value;
    const ok = await this._backendSet(key, value);
    if(!ok) return false;
    const check = await this._backendGet(key);
    return check === value;
  },
  async _remove(key){
    delete this._cache[key];
    await this._backendRemove(key);
  }
};

const REC_PREFIX = 'rec_';
function loadRecords(activityId){
  const v = Store.getJSON(REC_PREFIX+activityId, []);
  return Array.isArray(v) ? v : [];
}
// Returns true on confirmed save, false if the write could not be verified.
async function saveRecord(activityId, record){
  const all = loadRecords(activityId); all.unshift(record);

}
function getStudent(){ return Store.getString('studentName', ''); }

/* ---------------------------------------------------------------------------
   CHILD PROFILES — captured once per child, referenced by every session.
   Demographics are profile data, NOT per-record data, so they live in their
   own keyspace behind the same Store seam. Fields are exactly the set the
   content team specified: name, age, height, weight, dominant hand, photo.
   `capturedOn` is stored so a stale age is at least detectable later.
   Photo is a downscaled low-res data URL (or '' if none).
   --------------------------------------------------------------------------- */
const PROFILE_KEY = 'profiles';
function loadProfiles(){
  const v = Store.getJSON(PROFILE_KEY, []);
  return Array.isArray(v) ? v : [];
}
// Returns true on confirmed save, false if the write could not be verified.
async function saveProfiles(list){ return Store.setJSON(PROFILE_KEY, list); }
function profileById(id){ return loadProfiles().find(p=>p.id===id) || null; }
async function upsertProfile(profile){
  const list = loadProfiles();
  const i = list.findIndex(p=>p.id===profile.id);
  if(i===-1) list.unshift(profile); else list[i] = profile;
  return saveProfiles(list);
}
function newProfileId(){ return 'c' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
// The active child whose name flows into saved records.

/* ---------------------------------------------------------------------------
   DELETION / ENTRY MANAGEMENT — all routed through the Store seam, same as
   reads and writes, so the Capacitor swap still only touches _get/_set/etc.
   Deletion is a first-class feature here, not a debug path: this is children's
   disability data, and a teacher must be able to remove a wrong record, remove
   a child, or wipe the device cleanly. Every destructive call is explicit and
   confirmed at the UI layer; the CSV export is the only backup, so the UI
   points at it first.
   --------------------------------------------------------------------------- */
// Remove a single session record by its index within one activity's list.
// Returns true on confirmed write (or confirmed key removal when none remain).
async function deleteRecord(activityId, index){
  const all = loadRecords(activityId);
  if(index < 0 || index >= all.length) return false;
  all.splice(index, 1);
  if(all.length === 0){ await Store._remove(REC_PREFIX+activityId); return true; }
  return Store.setJSON(REC_PREFIX+activityId, all);
}
// How many saved records reference a given child, across every activity.
function recordCountForProfile(profileId){
  let n = 0;
  Store._keys().filter(k=>k.indexOf(REC_PREFIX)===0).forEach(k=>{
    const recs = Store.getJSON(k, []);
    if(Array.isArray(recs)) n += recs.filter(r=>r.profileId===profileId).length;
  });
  return n;
}
// Remove a child AND sweep every session record linked to them (by profileId).
// If the deleted child was active, clears the active selection too.
async function deleteProfile(profileId){
  // 1. sweep linked records out of every activity bucket
  const recKeys = Store._keys().filter(k=>k.indexOf(REC_PREFIX)===0);
  for(const k of recKeys){
    const recs = Store.getJSON(k, []);
    if(!Array.isArray(recs)) continue;
    const kept = recs.filter(r=>r.profileId !== profileId);
    if(kept.length === recs.length) continue;       // nothing for this child here
    if(kept.length === 0) await Store._remove(k);
    else await Store.setJSON(k, kept);
  }
  // 2. remove the profile itself
  const kept = loadProfiles().filter(p=>p.id !== profileId);
  const ok = await saveProfiles(kept);
  // 3. if this child was the active one, clear the selection + legacy name
  if(getActiveProfileId() === profileId){ await setActiveProfileId(''); await setStudent(''); }
  return ok;
}
// The danger-zone reset. Removes profiles, every activity's records, the active
// selection and legacy name. Deliberately KEEPS welcomeSeen so a teacher isn't
// dumped back to the intro screen after a data wipe.
async function clearAllData(){
  const recKeys = Store._keys().filter(k=>k.indexOf(REC_PREFIX)===0);
  for(const k of recKeys){ await Store._remove(k); }
  await Store._remove(PROFILE_KEY);
  await setActiveProfileId('');
  await setStudent('');
}

/* ---------------------------------------------------------------------------
   EXPORT — the data escape hatch. Until a native app adds real
   storage/cloud, this is how a teacher's session data leaves the device so it
   can't be silently lost. Builds one CSV across ALL activities.
   --------------------------------------------------------------------------- */
function activityNameById(id){
  for(const cat of ACTIVITY_DATA){
    for(const act of cat.activities){
      if(act.id === id) return { category: cat.category, activity: act.name };
    }
  }
  return { category: '', activity: id }; // id no longer in activities.js — still export it
}
function gatherAllRecords(){
  const rows = [];
  Store._keys().filter(k=>k.indexOf(REC_PREFIX)===0).forEach(k=>{
    const id = k.slice(REC_PREFIX.length);
    const meta = activityNameById(id);
    const recs = Store.getJSON(k, []);
    if(!Array.isArray(recs)) return;
    recs.forEach(r=>{
      // Join the child's demographics onto the row. Prefer profileId; fall back
      // to matching by name for any record saved before profiles existed.
      let p = r.profileId ? profileById(r.profileId) : null;
      if(!p && r.student) p = loadProfiles().find(x=>x.name===r.student) || null;
      rows.push({ category: meta.category, activity: meta.activity,
        student: r.student || (p?p.name:''), when: r.when || '',
        age: p?ageFromDOB(p.dob):'', dob: p?(p.dob||''):'', height: p?p.height:'', weight: p?p.weight:'',
        hand: p?p.dominantHand:'', values: r.values || {} });
    });
  });
  return rows;
}
function csvCell(v){
  const s = String(v == null ? '' : v);
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function buildCSV(rows){
  // Value columns = union of all field labels across every record, stable order.
  const valueCols = [];
  rows.forEach(r=>Object.keys(r.values).forEach(label=>{ if(valueCols.indexOf(label)===-1) valueCols.push(label); }));
  const header = ['Category','Activity','Student','DOB','Age','Height (cm)','Weight (kg)','Dominant hand','When', ...valueCols];
  const lines = [header.map(csvCell).join(',')];
  rows.forEach(r=>{
    const base = [r.category, r.activity, r.student, r.dob, r.age, r.height, r.weight, r.hand, r.when];
    const vals = valueCols.map(c=> r.values[c] != null ? r.values[c] : '');
    lines.push(base.concat(vals).map(csvCell).join(','));
  });
  return '\ufeff' + lines.join('\r\n'); // BOM so Excel reads UTF-8 (Indian-language names) correctly
}
async function exportCSV(){
  const rows = gatherAllRecords();
  if(!rows.length){ toast('No saved results to export yet.'); return; }
  const csv = buildCSV(rows);
  const stamp = new Date().toISOString().slice(0,10);
  const filename = `om-records-${stamp}.csv`;

  // NATIVE PATH: the browser <a download> trick does not reliably save a file
  // inside a Capacitor WebView (no download manager). Write the file to the
  // app's data directory via Filesystem, then hand it to the OS share sheet so
  // the teacher can save it to Files/Drive/email — the native equivalent of a
  // download. CSV is the only backup, so a failure here must be loud.
  const cap = window.Capacitor;
  if(cap && cap.isNativePlatform && cap.isNativePlatform()){
    try {
      const Filesystem = cap.Plugins.Filesystem;
      const Share = cap.Plugins.Share;
      const writeRes = await Filesystem.writeFile({
        path: filename,
        data: csv,
        directory: 'CACHE',            // Directory.Cache — fine for a transient export
        encoding: 'utf8'
      });
      // getUri gives a file:// path the share sheet can attach.
      const uriRes = await Filesystem.getUri({ path: filename, directory: 'CACHE' });
      await Share.share({
        title: 'O&M records export',
        text: `O&M records (${rows.length} ${rows.length===1?'record':'records'})`,
        url: uriRes.uri,
        dialogTitle: 'Save or send your records CSV'
      });
      toast(`Exported ${rows.length} ${rows.length===1?'record':'records'}.`);
    } catch(e){
      toast('Export failed — could not write the file. Try again.');
    }
    return;
  }

  // WEB PATH (unchanged): anchor download.
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  toast(`Exported ${rows.length} ${rows.length===1?'record':'records'}.`);
}
function toast(msg){ toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'), 1800); }

/* Age is derived from date of birth, never stored as a fixed number — so a
   record never shows a stale age. Returns '' if no/invalid DOB. */
function ageFromDOB(dob){
  if(!dob) return '';
  const b = new Date(dob); if(isNaN(b)) return '';
  const now = new Date();
  let a = now.getFullYear() - b.getFullYear();
  const m = now.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && now.getDate() < b.getDate())) a--;
  return a >= 0 && a < 130 ? String(a) : '';
}

/* Downscale a chosen image to a low-res square data URL before storing it.
   Keeps localStorage small and limits how identifiable a stored photo is.
   ~160px longest side, JPEG q0.7. Returns a Promise<dataURL>. */
function downscaleImage(file, max){
  max = max || 160;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('read failed'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('decode failed'));
      img.onload = ()=>{
        let { width:w, height:h } = img;
        if(w > h && w > max){ h = Math.round(h*max/w); w = max; }
        else if(h >= w && h > max){ w = Math.round(w*max/h); h = max; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function paint(html, dir, stagger, opts){

    screen.style.animation = 'none'; void screen.offsetWidth; screen.style.animation = '';
    screen.classList.toggle('stagger', !!stagger); screen.innerHTML = html;

    if(h1){ h1.setAttribute('tabindex','-1'); h1.focus({preventScroll:true}); }
  }
}

function handlePhotoPick(input){

    if(img){
      const fresh = document.createElement('img');
      fresh.id = 'photoImg'; fresh.className = 'photo-preview'; fresh.src = dataUrl; fresh.alt = 'Selected photo';
      img.replaceWith(fresh);
    }
    const clr = document.getElementById('photoClear'); if(clr) clr.style.display = '';
  }).catch(()=>toast('Could not read that image.'));
}
function clearPhoto(){
  pendingPhoto = null;
  const img = document.getElementById('photoImg');
  if(img){
    const fresh = document.createElement('span');
    fresh.id = 'photoImg'; fresh.className = 'photo-preview'; fresh.innerHTML = ICON.user;
    img.replaceWith(fresh);
  }
  const clr = document.getElementById('photoClear'); if(clr) clr.style.display = 'none';
  const file = document.getElementById('p_photo'); if(file) file.value = '';
}
async function handleProfileSave(existingId){
  const name = (document.getElementById('p_name').value || '').trim();
  if(!name){ toast('Please enter the child\u2019s name.'); return; }
  const btn = document.getElementById('saveProfileBtn');
  if(btn){ btn.disabled = true; setTimeout(()=>{ if(btn) btn.disabled=false; }, 300); }
  const profile = {
    id: existingId || newProfileId(),
    name,
    dob: (document.getElementById('p_dob').value || '').trim(),
    height: (document.getElementById('p_height').value || '').trim(),
    weight: (document.getElementById('p_weight').value || '').trim(),
    dominantHand: document.getElementById('p_hand').dataset.value || '',
    photo: pendingPhoto || '',
    capturedOn: existingId ? (profileById(existingId)||{}).capturedOn || new Date().toISOString() : new Date().toISOString()
  };
  const ok = await upsertProfile(profile);
  if(!ok){
    toast('Could not save — storage may be full. Export your data, then try again.');
    return;
  }
  // A newly added child becomes the active one.
  await setActiveProfileId(profile.id);
  await setStudent(profile.name);
  pendingPhoto = null;
  toast(existingId ? 'Child updated' : 'Child saved');
  showHub('none'); // back to the hub; form collapses to the active-child chip
}
/* ---------------------------------------------------------------------------
   SOP AUDIO — multi-language narration.
   Two paths, in priority order:
     1. act.sopTranslations present → language switcher + derived audio path.
        Files are produced by generate-audio.js and named audio/{id}_{lang}.mp3.
        This derived-path convention is the contract between the script and the
        app — change it in BOTH places or neither.
     2. act.audioFile present (legacy single-file) → play it directly.
     3. neither → the dashed placeholder.
   The chosen language is remembered through the Store seam (key 'audioLang').
   --------------------------------------------------------------------------- */
const AUDIO_LANGS = [
  { code:'hi', label:'हिन्दी' },   // Hindi
  { code:'ta', label:'தமிழ்' },    // Tamil
  { code:'bn', label:'বাংলা' },    // Bengali
];
const AUDIO_LANG_KEY = 'audioLang';
function getAudioLang(){
  const v = Store.getString(AUDIO_LANG_KEY, '');
  return AUDIO_LANGS.some(l=>l.code===v) ? v : AUDIO_LANGS[0].code;
}
function audioPathFor(activityId, lang){ return `audio/${activityId}_${lang}.mp3`; }
function buildAudioHtml(act){
  if(act.sopTranslations){
    const cur = getAudioLang();
    const buttons = AUDIO_LANGS.map(l=>{
      const has = !!(act.sopTranslations[l.code] && act.sopTranslations[l.code].length);
      // Languages with no translation text yet are shown disabled (no audio file will exist).
      return `<button type="button" onclick="switchAudioLang('${act.id}','${l.code}',this)" aria-pressed="${l.code===cur}" ${has?'':'disabled'}>${l.label}</button>`;
    }).join('');
    const src = audioPathFor(act.id, cur);
    // onerror → if the derived file isn't bundled yet, fall back to the placeholder text in-place.
    return `<div class="audio-lang">
      <span class="audio-lang-label">SOP narration — choose a language</span>
      <div class="seg" role="group" aria-label="Audio language">${buttons}</div>
      <audio id="sopAudio" controls src="${src}" onerror="audioMissing()"></audio>
      <div class="media-slot" id="sopAudioMissing" style="display:none">${ICON.audio}<span>Audio for this language isn't generated yet — run generate-audio.js, then rebuild.</span></div>
    </div>`;
  }
  if(act.audioFile){
    return `<audio controls src="${esc(act.audioFile)}" style="width:100%;margin-top:16px;"></audio>`;
  }
  return `<div class="media-slot">${ICON.audio}<span>Audio narration slot — add sopTranslations (or audioFile) in activities.js once generated.</span></div>`;
}
async function switchAudioLang(activityId, lang, btn){
  await Store.setString(AUDIO_LANG_KEY, lang);
  // Update pressed state on the buttons.
  const group = btn.parentElement;
  [...group.children].forEach(b=>b.setAttribute('aria-pressed','false'));
  btn.setAttribute('aria-pressed','true');
  // Swap the audio source and reset the missing-fallback.
  const audio = document.getElementById('sopAudio');
  const missing = document.getElementById('sopAudioMissing');
  if(missing) missing.style.display = 'none';
  if(audio){ audio.style.display = ''; audio.src = audioPathFor(activityId, lang); audio.load(); }
}
function audioMissing(){
  const audio = document.getElementById('sopAudio');
  const missing = document.getElementById('sopAudioMissing');
  if(audio) audio.style.display = 'none';
  if(missing) missing.style.display = '';
}
function showActivity(catIndex, actIndex, opts){
  opts = opts || {};
  const cat = ACTIVITY_DATA[catIndex];
  const act = cat.activities[actIndex];
  state = { category:catIndex, activity:actIndex };
  crumbEl.textContent = cat.category;
  backBtn.style.display = 'flex';
  backBtn.onclick = ()=>showActivityList('back');
  homeDot.innerHTML = catIcon(catIndex);
  themeFor(catIndex);
  const sopSteps = act.sop.map(s=>`<li>${esc(s)}</li>`).join('');
  const noteHtml = act.facilitatorNote ? `<div class="note"><strong>Facilitator note</strong>${esc(act.facilitatorNote)}</div>` : '';
  const audioHtml = buildAudioHtml(act);
  const videoHtml = act.videoFile ? `<video controls src="${esc(act.videoFile)}" style="width:100%;margin-top:16px;border-radius:14px;"></video>` : `<div class="media-slot">${ICON.video}<span>Demo video slot — add a filename in activities.js (videoFile) when available.</span></div>`;
  const fields = act.dataFields.map(f=>buildField(f)).join('');
  const resultLabels = act.dataFields.filter(f=>f.type==='result').map(f=>f.label);
  const records = loadRecords(act.id);
  const recHtml = records.length ? records.map((r,i)=>renderRecord(r, resultLabels, act.id, i)).join('') : '<p class="empty">No results logged yet — run the activity, then record below.</p>';
  const sopOpen = opts.sopCollapsed ? '' : 'open';
  const activeChild = getActiveProfile();
  const childBar = activeChild
    ? `<div class="activechild">${avatarFor(activeChild,'avatar')}<span class="who">${esc(activeChild.name)}<small>${childSub(activeChild) || 'Active child'}</small></span><button type="button" class="swap" onclick="showHub('back')">Change</button></div>`
    : `<div class="activechild"><span class="avatar">${ICON.user}</span><span class="who">No child selected<small>Pick or add a child before recording</small></span><button type="button" class="swap" onclick="showHub('back')">Choose</button></div>`;
  paint(`
    <h1 class="lede">${esc(act.name)}<small>${esc(cat.category)}</small></h1>
    ${childBar}
    <div class="panel primary" id="formPanel">
      <h2 class="panel-title">${ICON.edit} Record a result</h2>
      <form id="dataForm" onsubmit="return false;"><fieldset><legend class="visually-hidden">Record a result for ${esc(act.name)}</legend>${fields}<button type="button" class="save" id="saveBtn" onclick="handleSave('${act.id}')">Save result</button></fieldset></form>
    </div>
    <details class="sop" id="sopPanel" ${sopOpen}>
      <summary>${ICON.compass} How to run this <span class="chev">${ICON.chevron}</span></summary>
      <div class="sop-body"><div class="sop-inner"><ol class="sop-list">${sopSteps}</ol>${noteHtml}${audioHtml}${videoHtml}</div></div>
    </details>
    <div class="panel quiet"><h2 class="panel-title">${ICON.list} Past results</h2><div id="recordList">${recHtml}</div></div>
  `, opts.dir || 'fwd', false, { skipLedeFocus: !!opts.focusForm });
  if(opts.focusForm){
    const panel = document.getElementById('formPanel');
    if(panel){ panel.scrollIntoView({behavior:'smooth', block:'start'}); }
    const firstInput = screen.querySelector('#dataForm input, #dataForm textarea, .seg button');
    if(firstInput){ firstInput.focus({preventScroll:true}); }
  }
}
function buildField(f){
  if(f.type === 'count'){ return `<div class="field"><label for="f_${f.id}">${esc(f.label)}</label><input type="number" id="f_${f.id}" min="0" placeholder="0"></div>`; }
  if(f.type === 'result'){
    return `<div class="field"><label id="lbl_${f.id}">${esc(f.label)}</label><div class="seg" id="f_${f.id}" data-value="" role="group" aria-labelledby="lbl_${f.id}">${['Independent','Prompted','Unable'].map(v=>`<button type="button" onclick="pickSeg('f_${f.id}','${v}',this)" aria-pressed="false">${v}</button>`).join('')}</div></div>`;
  }
  if(f.type === 'checkbox'){ return `<div class="field"><div class="checkrow"><input type="checkbox" id="f_${f.id}"><label for="f_${f.id}">${esc(f.label)}</label></div></div>`; }
  return `<div class="field"><label for="f_${f.id}">${esc(f.label)}</label><textarea id="f_${f.id}" placeholder="Type any observations..."></textarea></div>`;
}
function pickSeg(groupId, value, btn){
  const group = document.getElementById(groupId);
  group.dataset.value = value;
  [...group.children].forEach(b=>b.setAttribute('aria-pressed','false'));
  btn.setAttribute('aria-pressed','true');
}
async function handleSave(activityId){
  const cat = ACTIVITY_DATA[state.category];
  const act = cat.activities[state.activity];
  const child = getActiveProfile();
  if(!child){ toast('Choose or add a child first.'); return; }
  const student = child.name;
  const btn = document.getElementById('saveBtn');
  if(btn){ btn.disabled = true; setTimeout(()=>{ if(btn) btn.disabled=false; }, 300); }
  const values = {};
  act.dataFields.forEach(f=>{
    const el = document.getElementById('f_'+f.id);
    if(f.type === 'count')        values[f.label] = el.value || '0';
    else if(f.type === 'result')  values[f.label] = el.dataset.value || '—';
    else if(f.type === 'checkbox')values[f.label] = el.checked ? 'Yes' : 'No';
    else                          values[f.label] = el.value || '';
  });
  const ok = await saveRecord(activityId, { student, profileId: child.id, when:new Date().toLocaleString(), values });
  if(!ok){
    toast('Could not save — storage may be full. Export your data, then try again.');
    return;
  }
  toast('Saved');
  showActivity(state.category, state.activity, { sopCollapsed:true, focusForm:true, dir:'none' });
}
function renderRecord(r, resultLabels, activityId, index){
  resultLabels = resultLabels || [];
  const entries = Object.entries(r.values).filter(([k,v])=>v && v!=='' && v!=='—');
  entries.sort((a,b)=>{ const ar = resultLabels.includes(a[0]) ? 0 : 1; const br = resultLabels.includes(b[0]) ? 0 : 1; return ar - br; });
  const pills = entries.map(([k,v])=>{ const isResult = resultLabels.includes(k); return `<span class="${isResult ? 'val-result' : ''}">${esc(k)}: ${esc(v)}</span>`; }).join('');
  const del = (activityId != null && index != null)
    ? `<button type="button" class="rec-del" aria-label="Delete this result" onclick="confirmDeleteRecord('${esc(activityId)}',${index})">${ICON.trash}</button>`
    : '';
  return `<div class="record"><div class="rec-head"><span class="rec-meta"><span class="who">${esc(r.student)}</span> <span class="when">· ${esc(r.when)}</span></span>${del}</div><div class="vals">${pills || '<span>(no values)</span>'}</div></div>`;
}
async function confirmDeleteRecord(activityId, index){
  if(!window.confirm('Delete this saved result?\n\nThis cannot be undone.')) return;
  const ok = await deleteRecord(activityId, index);
  if(!ok){ toast('Could not delete — please try again.'); return; }
  toast('Result deleted');
  // Re-render the current activity screen in place (no entrance slide).
  showActivity(state.category, state.activity, { sopCollapsed:true, dir:'none', skipLedeFocus:true });
}
// Always open on the Welcome page. (Earlier this was show-once via a
// `welcomeSeen` flag; the app now lands on Welcome every launch by request.)
//
// BOOT: storage is now cache-backed and the cache is filled asynchronously
// (localStorage on web, Capacitor Preferences on native). We MUST wait for
// Store.init() before the first paint, or render code reads an empty cache and
// the teacher sees no children/records on a cold start. If init somehow fails,
// we still paint Welcome (which reads nothing) so the app is never a blank
// screen, and surface a toast.
(async function boot(){
  try { await Store.init(); }
  catch(e){ setTimeout(()=>toast('Storage failed to load — please restart the app.'), 400); }
  showWelcome('fwd');
})();
</script>
